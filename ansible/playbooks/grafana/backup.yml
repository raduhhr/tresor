---
- name: Backup Grafana (stop → snapshot → start)
  hosts: prod
  become: true

  vars:
    backup_dir: "/mnt/data/files/Backups/grafana"
    source_dir: "/mnt/ssd/configs/grafana"
    container_name: "grafana"

  tasks:
    - name: Ensure backup directory exists
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Stop Grafana container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: stopped

    - name: Create compressed snapshot
      ansible.builtin.shell: |
        DATE=$(date +%d%m%Y-%H%M)
        tar -czf "{{ backup_dir }}/grafana-backup-$DATE.tar.gz" -C /mnt/ssd/configs grafana
        echo "{{ backup_dir }}/grafana-backup-$DATE.tar.gz"
      register: _snapshot
      changed_when: true

    - name: Delete snapshots older than 30 days
      ansible.builtin.shell: |
        find "{{ backup_dir }}" -name 'grafana-backup-*.tar.gz' -mtime +30 -delete
      changed_when: false

    - name: Start Grafana container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: started

    - name: Log backup
      ansible.builtin.lineinfile:
        path: /var/log/grafana-backup.log
        line: "[{{ ansible_date_time.iso8601 }}] Snapshot created: {{ _snapshot.stdout }}"
        create: true
        mode: "0644"
