---
- name: Stop cloudflared tunnel
  hosts: tresor
  become: true
  gather_facts: false

  vars:
    container_name: cloudflared

  tasks:
    - name: Stop cloudflared container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: stopped
      register: _stop

    - name: Show status after stop
      ansible.builtin.debug:
        msg: "cloudflared stopped successfully"
      when: _stop.changed

