---
- name: "Cloudflared status (graceful: supports envs with tunnel disabled)"
  hosts: tresor
  become: true
  gather_facts: false

  vars:
    tunnel_expected: "{{ cloudflared.enabled | default(true) | bool }}"
    metrics_enabled: "{{ (cloudflared.enable_metrics | default(true) | bool) and tunnel_expected }}"
    metrics_port: "{{ cloudflared.metrics_port | default(8086) }}"

  tasks:
    - name: Gather container info
      community.docker.docker_container_info:
        name: cloudflared
      register: _ci
      changed_when: false

    - name: Note when cloudflared is disabled for this host
      ansible.builtin.debug:
        msg: "cloudflared is disabled for this host; skipping runtime checks."
      when: not tunnel_expected

    - name: Assert container absent when disabled (keeps QA clean)
      ansible.builtin.assert:
        that:
          - not _ci.exists
        fail_msg: "cloudflared is disabled but the container exists."
      when: not tunnel_expected

    - name: Assert container is running (enabled hosts)
      ansible.builtin.assert:
        that:
          - _ci.exists
          - _ci.container.State.Running
          - _ci.container.State.ExitCode == 0
        fail_msg: "cloudflared container not healthy."
      when: tunnel_expected

    - name: Probe /metrics (enabled + published)
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ metrics_port }}/metrics"
        status_code: 200
        return_content: false
      changed_when: false
      when: metrics_enabled

