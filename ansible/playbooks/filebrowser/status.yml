---
- name: "FileBrowser status (graceful check with HTTP probe)"
  hosts: tresor
  become: true
  gather_facts: false

  vars:
    container_name: filebrowser
    fb_host: "{{ filebrowser_bind_addr | default('127.0.0.1') }}"
    fb_port: "{{ filebrowser_listen_port | default(8080) }}"
    fb_enabled: true  # set false if you ever disable it in inventory

  tasks:
    - name: Gather container info
      community.docker.docker_container_info:
        name: "{{ container_name }}"
      register: _ci
      changed_when: false

    - name: Note when FileBrowser is disabled
      ansible.builtin.debug:
        msg: "FileBrowser is disabled for this host; skipping runtime checks."
      when: not fb_enabled

    - name: Assert container absent when disabled
      ansible.builtin.assert:
        that:
          - not _ci.exists
        fail_msg: "FileBrowser is disabled but the container exists."
      when: not fb_enabled

    - name: Assert container is running
      ansible.builtin.assert:
        that:
          - _ci.exists
          - _ci.container.State.Running
          - _ci.container.State.ExitCode == 0
        fail_msg: "FileBrowser container not healthy or not running."
      when: fb_enabled

    - name: Probe FileBrowser web UI
      ansible.builtin.uri:
        url: "http://{{ fb_host }}:{{ fb_port }}/"
        status_code: 200
        return_content: false
      changed_when: false
      when: fb_enabled

