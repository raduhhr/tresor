---
- name: Backup Kiwix (stop → snapshot → start, excludes ZIM files)
  hosts: prod
  become: true

  vars:
    backup_dir: "/mnt/data/files/Backups/kiwix"
    source_dir: "/mnt/ssd/services/kiwix"
    container_name: "kiwix"

  tasks:
    - name: Ensure backup directory exists
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Stop Kiwix container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: stopped

    - name: Create compressed snapshot (excludes .zim files)
      ansible.builtin.shell: |
        DATE=$(date +%d%m%Y-%H%M)
        tar -czf "{{ backup_dir }}/kiwix-backup-$DATE.tar.gz" \
          --exclude='*.zim' \
          -C /mnt/ssd/services kiwix
        echo "{{ backup_dir }}/kiwix-backup-$DATE.tar.gz"
      register: _snapshot
      changed_when: true

    - name: Delete snapshots older than 30 days
      ansible.builtin.shell: |
        find "{{ backup_dir }}" -name 'kiwix-backup-*.tar.gz' -mtime +30 -delete
      changed_when: false

    - name: Start Kiwix container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: started

    - name: Log backup
      ansible.builtin.lineinfile:
        path: /var/log/kiwix-backup.log
        line: "[{{ ansible_date_time.iso8601 }}] Snapshot created: {{ _snapshot.stdout }}"
        create: true
        mode: "0644"
