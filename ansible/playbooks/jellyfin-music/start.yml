---
- name: Start Jellyfin Music
  hosts: tresor
  become: true
  gather_facts: false

  vars:
    container_name: jellyfin-music

  tasks:
    - name: Ensure Jellyfin Music container is started
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: started
      register: _start

    - name: Show status after start
      ansible.builtin.debug:
        msg: "Jellyfin Music started successfully"
      when: _start.changed
