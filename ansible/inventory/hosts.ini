[prod]
tresor ansible_host=192.168.1.100

[qa]
tresor-vm ansible_host=192.168.122.200

[vps]
tresor-vps ansible_host=1.2.3.4

[all:vars]
ansible_user=ansible
ansible_ssh_private_key_file=~/.ssh/id_ed25519_homelab

[vps:vars]
ansible_ssh_private_key_file=~/.ssh/id_ed25519_homelab_vps
ansible_ssh_common_args='-o IdentitiesOnly=yes'

# Optional: bellow line can be dropped since ansible.cfg has interpreter_python=auto_silent
# ansible_python_interpreter=/usr/bin/python3

