---
- name: Restart Uptime Kuma
  hosts: tresor
  become: true
  gather_facts: false

  vars:
    container_name: uptime-kuma

  tasks:
    - name: Restart Uptime Kuma container
      community.docker.docker_container:
        name: "{{ container_name }}"
        restart: true
      register: _restart

    - name: Show status after restart
      ansible.builtin.debug:
        msg: "Uptime Kuma restarted successfully"
      when: _restart.changed
