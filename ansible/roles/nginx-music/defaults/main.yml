---
# Public hostname (A record -> VPS)
nginx_music_domain: "music.example.com"

# Backend (Tresor) over WireGuard
nginx_music_upstream_host: "10.66.66.2"
nginx_music_upstream_port: 18096

# TLS via Let's Encrypt
nginx_music_enable_tls: true
nginx_music_acme_email: "you@domain.tld"     # override in vault/group_vars

# UFW handling (VPS base likely already uses ufw)
nginx_music_manage_ufw: true
nginx_music_open_ports: [80, 443]

# Nginx tuning
nginx_music_max_body: "50M"
nginx_music_hsts: true

# ============================================================
# SECURITY ENHANCEMENTS
# ============================================================

# Rate limiting
# Adjust these based on your expected traffic
nginx_music_rate_limit_general: "10r/s"      # General requests (web UI, media)
nginx_music_rate_limit_strict: "5r/s"       # Strict (login, websockets)
nginx_music_rate_limit_burst_general: 20    # Allow bursts for browsing
nginx_music_rate_limit_burst_strict: 5      # Tight control on auth

# Connection limits
nginx_music_conn_limit: 20                   # Max concurrent connections per IP

# Security headers (all enabled by default)
nginx_music_security_headers:
  x_frame_options: "SAMEORIGIN"
  x_content_type_options: "nosniff"
  x_xss_protection: "1; mode=block"
  referrer_policy: "no-referrer"
  permissions_policy: "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
  
# CSP (Content Security Policy) for Jellyfin
# This is tuned to work with Jellyfin's UI requirements
nginx_music_csp: "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; img-src 'self' data: https:; media-src 'self' blob: https:; connect-src 'self' wss: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval';"

# Allowed HTTP methods
nginx_music_allowed_methods: ["GET", "POST", "HEAD", "OPTIONS"]

# Block sensitive Jellyfin API endpoints from public access
nginx_music_block_api_endpoints: true

# API endpoints to block (system info, user enumeration, etc.)
nginx_music_blocked_paths:
  - "^/(System|Users|Branding|health|Sessions|Devices)"
  - "^/(swagger|api-docs|manage|admin)"
  - "^/Items/[^/]+/File"
  - "^/Audio/[^/]+/universal"
  - "^/Videos/[^/]+/stream"

# Require authentication for API access (blocks unauthenticated enumeration)
nginx_music_require_auth_for_api: true

# Logging
nginx_music_log_blocked: true
nginx_music_blocked_log_path: "/var/log/nginx/jellyfin_blocked.log"
nginx_music_denied_log_path: "/var/log/nginx/jellyfin_denied.log"

# Cache for static assets
nginx_music_enable_static_cache: true
nginx_music_cache_duration: "7d"
# ============================================================
# filebrowser-public vhost vars (cloud.example.com)
# Added by install-filebrowser-public.sh — do not duplicate.
# Same nginx instance as music.example.com; separate server block + cert.
# ============================================================
nginx_cloud_domain:        "cloud.example.com"
nginx_cloud_upstream_host: "10.66.66.2"
nginx_cloud_upstream_port: 8082

# Large-file aware (friends dropping files, not streaming)
nginx_cloud_max_body:              "10G"
nginx_cloud_proxy_read_timeout:    "600s"
nginx_cloud_proxy_send_timeout:    "600s"
nginx_cloud_proxy_connect_timeout: "30s"

nginx_cloud_hsts:              true
nginx_cloud_rate_limit:        "5r/s"
nginx_cloud_rate_limit_burst:  30
nginx_cloud_conn_limit:        30

nginx_cloud_access_log: "/var/log/nginx/cloud_access.log"
nginx_cloud_error_log:  "/var/log/nginx/cloud_error.log"
