---
- name: "Uptime Kuma status (Traefik-only, no host port probe)"
  hosts: tresor
  become: true
  gather_facts: false

  vars:
    container_name: uptime-kuma
    kuma_enabled: true

  tasks:
    - name: Gather container info
      community.docker.docker_container_info:
        name: "{{ container_name }}"
      register: _ci
      changed_when: false

    - name: Note when Uptime Kuma is disabled
      ansible.builtin.debug:
        msg: "Uptime Kuma is disabled for this host; skipping runtime checks."
      when: not kuma_enabled

    - name: Assert container absent when disabled
      ansible.builtin.assert:
        that:
          - not _ci.exists
        fail_msg: "Uptime Kuma is disabled but the container exists."
      when: not kuma_enabled

    - name: Assert container is running
      ansible.builtin.assert:
        that:
          - _ci.exists
          - _ci.container.State.Running
          - _ci.container.State.ExitCode == 0
        fail_msg: "Uptime Kuma container not healthy or not running."
      when: kuma_enabled

    - name: Show container details
      ansible.builtin.debug:
        msg:
          image: "{{ _ci.container.Config.Image }}"
          status: "{{ _ci.container.State.Status }}"
          networks: "{{ _ci.container.NetworkSettings.Networks.keys() | list }}"
      when: kuma_enabled and _ci.exists
