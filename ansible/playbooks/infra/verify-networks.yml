---
- name: Verify Docker networks (DRY with networks role)
  hosts: tresor
  become: true
  vars:
    networks_src: "{{ tresor_networks }}"
  tasks:
    - name: Get info for each expected network
      community.docker.docker_network_info:
        name: "{{ item.name }}"
      loop: "{{ networks_src }}"
      register: netinfo

    - name: Assert network exists, internal flag, and IPAM match
      ansible.builtin.assert:
        that:
          - item.exists | default(false)
          - (item.network.Internal | default(false)) == (item.item.internal | bool)
          - (item.network.IPAM.Config[0].Subnet   | default('')) == (item.item.subnet)
          - (item.network.IPAM.Config[0].Gateway  | default('')) == (item.item.gateway)
        quiet: true
      loop: "{{ netinfo.results }}"
      loop_control:
        label: "{{ item.item.name }}"

