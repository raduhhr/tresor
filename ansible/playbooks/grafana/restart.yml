---
- name: Restart Grafana
  hosts: tresor
  become: true
  gather_facts: false

  vars:
    container_name: grafana

  tasks:
    - name: Restart Grafana container
      community.docker.docker_container:
        name: "{{ container_name }}"
        restart: true
      register: _restart

    - name: Show status after restart
      ansible.builtin.debug:
        msg: "Grafana restarted successfully"
      when: _restart.changed
