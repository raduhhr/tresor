---
- name: Start Kiwix
  hosts: tresor
  become: true
  gather_facts: false

  vars:
    container_name: kiwix

  tasks:
    - name: Ensure Kiwix container is started
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: started
      register: _start

    - name: Show status after start
      ansible.builtin.debug:
        msg: "Kiwix started successfully"
      when: _start.changed
