---
- name: Restart Jellyfin Music
  hosts: tresor
  become: true
  gather_facts: false

  vars:
    container_name: jellyfin-music

  tasks:
    - name: Restart Jellyfin Music container
      community.docker.docker_container:
        name: "{{ container_name }}"
        restart: true
      register: _restart

    - name: Show status after restart
      ansible.builtin.debug:
        msg: "Jellyfin Music restarted successfully"
      when: _restart.changed
