---
- name: Ensure Grafana networks exist
  community.docker.docker_network:
    name: "{{ item }}"
    state: present
  loop: "{{ grafana_networks }}"

- name: Ensure Grafana config directory exists
  ansible.builtin.file:
    path: "{{ grafana_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure Grafana data directory exists with correct ownership
  ansible.builtin.file:
    path: "{{ grafana_data_dir }}"
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"

- name: Ensure Grafana provisioning directories exist
  ansible.builtin.file:
    path: "{{ grafana_config_dir }}/provisioning/{{ item }}"
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"
  loop:
    - datasources
    - dashboards

- name: Provision Prometheus datasource
  ansible.builtin.template:
    src: datasource.yml.j2
    dest: "{{ grafana_config_dir }}/provisioning/datasources/prometheus.yml"
    owner: "472"
    group: "472"
    mode: "0644"

- name: Build Grafana environment variables
  ansible.builtin.set_fact:
    _grafana_env:
      TZ: "{{ grafana_tz }}"
      GF_SECURITY_ADMIN_USER: "{{ grafana_admin_user }}"
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
      GF_SERVER_DOMAIN: "{{ grafana_domain }}"
      GF_SERVER_ROOT_URL: "{{ grafana_root_url }}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "{{ grafana_serve_from_sub_path | string | lower }}"
      GF_SECURITY_ALLOW_EMBEDDING: "{{ grafana_allow_embedding | string | lower }}"
      GF_SECURITY_COOKIE_SECURE: "{{ grafana_cookie_secure | string | lower }}"
      GF_SECURITY_COOKIE_SAMESITE: "{{ grafana_cookie_samesite }}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_PATHS_PROVISIONING: "/etc/grafana/provisioning"
  no_log: true

- name: Build Grafana networks list
  ansible.builtin.set_fact:
    _grafana_networks_list: "{{ grafana_networks | map('regex_replace', '^(.*)$', '{\"name\": \"\\1\"}') | map('from_yaml') | list }}"

- name: Build Traefik labels (when enabled)
  ansible.builtin.set_fact:
    _grafana_labels:
      traefik.enable: "true"
      traefik.http.routers.grafana.rule: "Host(`{{ grafana_domain }}`)"
      traefik.http.routers.grafana.entrypoints: "{{ grafana_traefik_entrypoint }}"
      traefik.http.routers.grafana.middlewares: "{{ grafana_traefik_middlewares }}"
      traefik.http.services.grafana.loadbalancer.server.port: "{{ grafana_port | string }}"
  when: grafana_enable_traefik | bool

- name: Build labels (Traefik disabled)
  ansible.builtin.set_fact:
    _grafana_labels:
      traefik.enable: "false"
  when: not (grafana_enable_traefik | bool)

- name: Build published ports list
  ansible.builtin.set_fact:
    _grafana_ports: "{{ [grafana_bind_addr ~ ':' ~ grafana_host_port ~ ':' ~ grafana_port] if grafana_expose_host_port else [] }}"

- name: Run Grafana container
  community.docker.docker_container:
    name: grafana
    image: "{{ grafana_image }}"
    pull: true
    restart_policy: unless-stopped
    ports: "{{ _grafana_ports }}"
    networks: "{{ _grafana_networks_list }}"
    labels: "{{ _grafana_labels }}"

    env: "{{ _grafana_env }}"

    volumes:
      - "{{ grafana_config_dir }}/provisioning:/etc/grafana/provisioning:ro"
      - "{{ grafana_data_dir }}:/var/lib/grafana"

    user: "472:472"
    state: started


- name: Wait for Grafana container to be running
  community.docker.docker_container_info:
    name: "{{ grafana_container_name }}"
  register: _container_info
  retries: 10
  delay: 2
  until: 
    - _container_info.exists
    - _container_info.container.State.Running
  changed_when: false

- name: Wait for Grafana to be healthy (via docker exec)
  ansible.builtin.command: >
    docker exec {{ grafana_container_name }} 
    wget -q -O- http://localhost:{{ grafana_port }}/api/health
  register: _health_check
  retries: 15
  delay: 2
  until: _health_check.rc == 0
  changed_when: false

- name: Show Grafana deployment summary
  ansible.builtin.debug:
    msg:
      - "✅ Grafana deployed successfully!"
      - "Container: {{ grafana_container_name }}"
      - "Access URL: {{ grafana_root_url }}"
      - "Admin user: {{ grafana_admin_user }}"
      - "Networks: {{ grafana_networks | join(', ') }}"
      - "Traefik: {{ 'enabled' if grafana_enable_traefik else 'disabled (LAN-only)' }}"
      - "Datasource: Prometheus (auto-provisioned)"