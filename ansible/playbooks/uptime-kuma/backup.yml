---
- name: Backup Uptime-Kuma (stop → snapshot → start)
  hosts: prod
  become: true

  vars:
    backup_dir: "/mnt/data/files/Backups/uptime-kuma"
    container_name: "uptime-kuma"

  tasks:
    - name: Ensure backup directory exists
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Stop Uptime-Kuma container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: stopped

    - name: Create compressed snapshot
      ansible.builtin.shell: |
        DATE=$(date +%d%m%Y-%H%M)
        tar -czf "{{ backup_dir }}/uptime-kuma-backup-$DATE.tar.gz" -C /mnt/ssd/configs uptime-kuma
        echo "{{ backup_dir }}/uptime-kuma-backup-$DATE.tar.gz"
      register: _snapshot
      changed_when: true

    - name: Delete snapshots older than 30 days
      ansible.builtin.shell: |
        find "{{ backup_dir }}" -name 'uptime-kuma-backup-*.tar.gz' -mtime +30 -delete
      changed_when: false

    - name: Start Uptime-Kuma container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: started

    - name: Log backup
      ansible.builtin.lineinfile:
        path: /var/log/uptime-kuma-backup.log
        line: "[{{ ansible_date_time.iso8601 }}] Snapshot created: {{ _snapshot.stdout }}"
        create: true
        mode: "0644"
