---
- name: Stop Uptime Kuma
  hosts: tresor
  become: true
  gather_facts: false

  vars:
    container_name: uptime-kuma

  tasks:
    - name: Stop Uptime Kuma container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: stopped
      register: _stop

    - name: Show status after stop
      ansible.builtin.debug:
        msg: "Uptime Kuma stopped successfully"
      when: _stop.changed
