---
# Ensure Docker data-root exists (SSD)
- name: Ensure data root exists on SSD
  ansible.builtin.file:
    path: "{{ docker_data_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [docker, docker:install]

# Base packages
- name: Install APT prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes
  tags: [docker, docker:install]

# --- Modern keyrings-based repo setup ---
- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags: [docker, docker:install]

- name: Install Docker APT key (keyrings)
  ansible.builtin.get_url:
    url: "{{ docker_apt_repo }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  tags: [docker, docker:install]

- name: Add Docker APT repository (keyrings)
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] {{ docker_apt_repo }} {{ docker_apt_distro }} stable"
    filename: docker
  tags: [docker, docker:install]

# --- Required: kernel modules & sysctl for Docker bridge networking ---
- name: Ensure overlay/br_netfilter loaded
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop: [overlay, br_netfilter]
  tags: [docker, docker:install]

- name: Persist kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/docker-tresor.conf
    mode: "0644"
    content: |
      overlay
      br_netfilter
  tags: [docker, docker:install]

- name: Persist bridge sysctls
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-docker-bridge.conf
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables=1
      net.bridge.bridge-nf-call-ip6tables=1
  tags: [docker, docker:install]

- name: Apply sysctl
  ansible.builtin.command: sysctl --system
  changed_when: false
  tags: [docker, docker:install]

# --- Optional: prepare userns subuid/subgid (only if enabled) ---
# Note: daemon.json should have "userns-remap": "<value>" only if remap is non-empty
- name: Ensure dockremap exists in /etc/subuid
  ansible.builtin.lineinfile:
    path: /etc/subuid
    regexp: '^dockremap:'
    line: "dockremap:{{ docker_userns_base | default(100000) }}:{{ docker_userns_range | default(65536) }}"
    create: true
    mode: "0644"
  when: (docker_userns_remap | default('')) | length > 0
  tags: [docker, docker:config, docker:userns]

- name: Ensure dockremap exists in /etc/subgid
  ansible.builtin.lineinfile:
    path: /etc/subgid
    regexp: '^dockremap:'
    line: "dockremap:{{ docker_userns_base | default(100000) }}:{{ docker_userns_range | default(65536) }}"
    create: true
    mode: "0644"
  when: (docker_userns_remap | default('')) | length > 0
  tags: [docker, docker:config, docker:userns]

# --- If userns is OFF, remove stale dockremap lines (harmless if absent) ---        # <<<
- name: Remove dockremap in /etc/subuid when userns disabled
  ansible.builtin.lineinfile:
    path: /etc/subuid
    regexp: '^dockremap:'
    state: absent
    create: false
  when: (docker_userns_remap | default('')) | length == 0
  tags: [docker, docker:config, docker:userns]

- name: Remove dockremap in /etc/subgid when userns disabled
  ansible.builtin.lineinfile:
    path: /etc/subgid
    regexp: '^dockremap:'
    state: absent
    create: false
  when: (docker_userns_remap | default('')) | length == 0
  tags: [docker, docker:config, docker:userns]

# --- Engine & tooling (supports fixed version via docker_pkg_version) ---
# (Guard docker_packages with a safe default in case it's undefined)                  # <<<
- name: Ensure docker_packages has a safe default
  ansible.builtin.set_fact:
    docker_packages: "{{ docker_packages | default(['docker-ce','docker-ce-cli','containerd.io','docker-buildx-plugin','docker-compose-plugin','python3-docker']) }}"
  tags: [docker, docker:install]

# Example var: docker_pkg_version: "5:28.0.1-1~debian.12~bookworm"
- name: Build Docker package list (with optional version pin)
  ansible.builtin.set_fact:
    _docker_pkgs_effective: >-
      {{
        docker_packages | map('regex_replace','^(.*)$','\\1=' ~ docker_pkg_version) | list
        if (docker_pkg_version is defined and docker_pkg_version|length > 0)
        else docker_packages
      }}
  tags: [docker, docker:install]

- name: Install Docker Engine & tools
  ansible.builtin.apt:
    name: "{{ _docker_pkgs_effective }}"
    state: present
    update_cache: yes
  tags: [docker, docker:install]

# Optional: hold packages to prevent unintended upgrades (idempotent)
- name: Compute package names without versions (for hold)
  ansible.builtin.set_fact:
    _docker_pkgs_names: "{{ _docker_pkgs_effective | map('regex_replace', '=.*$', '') | list }}"
  when: docker_hold | default(false)
  tags: [docker, docker:install]

- name: Hold Docker packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ _docker_pkgs_names | default([]) }}"
  when: docker_hold | default(false)
  tags: [docker, docker:install]

# --- Daemon config ---
- name: Ensure /etc/docker exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [docker, docker:config]

- name: Drop /etc/docker/daemon.json
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker
  tags: [docker, docker:config]

- name: Validate daemon.json is valid JSON
  command: python3 -m json.tool /etc/docker/daemon.json
  changed_when: false

- name: Ensure docker service is not masked
  ansible.builtin.systemd:
    name: docker
    masked: no
  tags: [docker, docker:config]

- name: Enable & start Docker
  ansible.builtin.service:
    name: docker
    enabled: yes
    state: started
  tags: [docker, docker:config]

# Make sure handler ran before any external verify task calls
- name: Flush handlers so docker restarts before external verification
  ansible.builtin.meta: flush_handlers
  tags: [docker, docker:config]

# --- Security: restrict docker socket access ---
- name: Get passwd entries (to guard group membership changes)
  ansible.builtin.getent:
    database: passwd
  tags: [docker, docker:security]

- name: Ensure docker group members (skip non-existent users)
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: yes
  loop: "{{ docker_group_members | default([]) }}"
  when: item in ansible_facts.getent_passwd
  tags: [docker, docker:security]

- name: Remove non-whitelisted users from docker group
  ansible.builtin.command: gpasswd -d {{ item }} docker
  register: _docker_group_drop
  changed_when: _docker_group_drop.rc == 0
  failed_when: false
  loop: "{{ docker_group_drop_users | default([]) }}"
  tags: [docker, docker:security]

