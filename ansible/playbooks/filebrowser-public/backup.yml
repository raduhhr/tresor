---
# Backs up DB + config only (not /mnt/hdd/cloud data — that's on its own path).
- name: Backup filebrowser-public config + DB
  hosts: prod
  gather_facts: true
  become: false
  vars:
    backup_dir: "/mnt/data/files/Backups/filebrowser-public"

  tasks:
    - name: Ensure backup dir exists
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: "0755"
      become: true

    - name: Create timestamped archive (config + DB only)
      ansible.builtin.shell: |
        DATE=$(date +%Y%m%dT%H%M%S)
        tar -czf "{{ backup_dir }}/filebrowser-public-backup-${DATE}.tar.gz" \
            -C /mnt/ssd/configs filebrowser-public
        echo "{{ backup_dir }}/filebrowser-public-backup-${DATE}.tar.gz"
      register: _fbpub_backup
      changed_when: true
      become: true

    - name: Prune backups older than 30 days
      ansible.builtin.shell: |
        find "{{ backup_dir }}" \
             -name 'filebrowser-public-backup-*.tar.gz' \
             -mtime +30 -delete
      changed_when: false
      become: true

    - ansible.builtin.debug:
        msg: "Backup written → {{ _fbpub_backup.stdout }}"
