# Filebrowser
filebrowser_network_publish: "lan_pub"       # lets Docker bind host port 8080
filebrowser_bind_addr: "192.168.1.100"
filebrowser_listen_port: 8080
filebrowser_admin_user: "admin"
filebrowser_admin_pass: "{{ vault_filebrowser_admin_pass }}"
filebrowser_config_dir: "/mnt/ssd/configs/filebrowser"
filebrowser_db_dir: "/mnt/ssd/configs/filebrowser/db"
filebrowser_root_dir: "/mnt/data/files"