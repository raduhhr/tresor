---
- name: Backup steam-free-notifier (live snapshot — cron script, no container)
  hosts: prod
  become: true

  vars:
    backup_dir: "/mnt/data/files/Backups/steam-free-notifier"
    source_dir: "/opt/steam-free-notifier"

  tasks:
    - name: Ensure backup directory exists
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create compressed snapshot
      ansible.builtin.shell: |
        DATE=$(date +%d%m%Y-%H%M)
        tar -czf "{{ backup_dir }}/steam-free-notifier-backup-$DATE.tar.gz" -C /opt steam-free-notifier
        echo "{{ backup_dir }}/steam-free-notifier-backup-$DATE.tar.gz"
      register: _snapshot
      changed_when: true

    - name: Delete snapshots older than 30 days
      ansible.builtin.shell: |
        find "{{ backup_dir }}" -name 'steam-free-notifier-backup-*.tar.gz' -mtime +30 -delete
      changed_when: false

    - name: Log backup
      ansible.builtin.lineinfile:
        path: /var/log/steam-free-notifier-backup.log
        line: "[{{ ansible_date_time.iso8601 }}] Snapshot created: {{ _snapshot.stdout }}"
        create: true
        mode: "0644"
