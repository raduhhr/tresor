---
# defaults file for filebrowser


# networks: only LAN
filebrowser_network_primary: "internal_net"
filebrowser_network_publish: "lan_pub"

# listen/bind
filebrowser_bind_addr: "192.168.1.100"
filebrowser_listen_port: 8080         # LAN port

# dirs
filebrowser_config_dir: "/mnt/ssd/configs/filebrowser"
filebrowser_db_dir: "/mnt/ssd/configs/filebrowser/db"
