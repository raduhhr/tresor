---
- name: Stop Traefik
  hosts: tresor
  become: true
  gather_facts: false

  vars:
    container_name: traefik

  tasks:
    - name: Stop Traefik container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: stopped
      register: _stop

    - name: Show status after stop
      ansible.builtin.debug:
        msg: "Traefik stopped successfully"
      when: _stop.changed

