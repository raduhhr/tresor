---
- name: Restart cloudflared tunnel
  hosts: tresor
  become: true
  gather_facts: false

  vars:
    container_name: cloudflared

  tasks:
    - name: Restart cloudflared container
      community.docker.docker_container:
        name: "{{ container_name }}"
        restart: true
      register: _restart

    - name: Show status after restart
      ansible.builtin.debug:
        msg: "cloudflared restarted successfully"
      when: _restart.changed

