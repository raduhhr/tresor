---
- name: Start Uptime Kuma
  hosts: tresor
  become: true
  gather_facts: false

  vars:
    container_name: uptime-kuma

  tasks:
    - name: Ensure Uptime Kuma container is started
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: started
      register: _start

    - name: Show status after start
      ansible.builtin.debug:
        msg: "Uptime Kuma started successfully"
      when: _start.changed
